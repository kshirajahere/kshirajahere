<svg xmlns="http://www.w3.org/2000/svg" width="1152" height="768" viewBox="0 0 1152 768" role="img" aria-label="Animated character playing on 3D contributions graph">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="trailGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ffe0" stop-opacity="0"/>
      <stop offset="100%" stop-color="#00ffe0" stop-opacity="0.8"/>
    </linearGradient>

    <path id="run-track" d="M 92 204 C 320 322, 560 476, 1022 682"/>
  </defs>

  <image
    href="https://raw.githubusercontent.com/kshirajahere/kshirajahere/main/profile-3d-contrib/profile-kshirajahere-3d.svg"
    x="0"
    y="0"
    width="1152"
    height="768"
    preserveAspectRatio="xMidYMid slice"
  />

  <g opacity="0.55">
    <use href="#run-track" fill="none" stroke="url(#trailGradient)" stroke-width="6" stroke-linecap="round" stroke-dasharray="10 14"/>
    <animate
      attributeName="opacity"
      values="0.30;0.70;0.30"
      dur="2.6s"
      repeatCount="indefinite"
    />
  </g>

  <g filter="url(#glow)">
    <g transform="translate(0 0)">
      <ellipse cx="0" cy="15" rx="12" ry="5" fill="#00ffe0" opacity="0.30"/>
      <image
        href="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f3c3.svg"
        x="-24"
        y="-64"
        width="48"
        height="48"
      />
      <animateMotion
        dur="7.2s"
        repeatCount="indefinite"
        rotate="auto"
        keyTimes="0;0.5;1"
        keySplines="0.42 0 0.58 1;0.42 0 0.58 1"
        calcMode="spline"
      >
        <mpath href="#run-track"/>
      </animateMotion>
      <animateTransform
        attributeName="transform"
        type="translate"
        additive="sum"
        values="0 0; 0 -5; 0 0"
        dur="0.40s"
        repeatCount="indefinite"
      />
    </g>
  </g>

  <g>
    <g transform="translate(0 0)">
      <image
        href="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/26bd.svg"
        x="-10"
        y="-16"
        width="20"
        height="20"
      />
      <animateMotion dur="7.2s" begin="-0.28s" repeatCount="indefinite" rotate="auto">
        <mpath href="#run-track"/>
      </animateMotion>
      <animateTransform
        attributeName="transform"
        type="translate"
        additive="sum"
        values="0 0; 0 -7; 0 0"
        dur="0.30s"
        repeatCount="indefinite"
      />
    </g>
  </g>

  <g fill="#00ffe0" opacity="0.5">
    <circle r="3">
      <animateMotion dur="7.2s" begin="-0.6s" repeatCount="indefinite">
        <mpath href="#run-track"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;0.55;0" dur="1.1s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.2">
      <animateMotion dur="7.2s" begin="-1.2s" repeatCount="indefinite">
        <mpath href="#run-track"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;0.45;0" dur="1.1s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
